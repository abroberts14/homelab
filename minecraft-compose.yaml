version: "3.9"

services:
  bedrock:
    image: itzg/minecraft-bedrock-server:latest
    container_name: bedrock
    networks:
      - coolify
    ports:
      - "19132:19132/udp"
    environment:
      - EULA=TRUE
      - TZ=America/New_York
      # VERSION=LATEST relies on scraping minecraft.net, which periodically
      # returns 500 when Mojang changes/rate-limits the endpoint. Pin a known
      # version and bump manually until the upstream itzg image fixes it.
      - VERSION=1.26.30.30
      - SERVER_NAME=Buffalo Bolt Bedrock
      - GAMEMODE=survival
      - DIFFICULTY=easy
      - ALLOW_CHEATS=false
      - ONLINE_MODE=true
    volumes:
      - /docker/appdata/minecraft-bedrock:/data
    restart: unless-stopped

networks:
  coolify:
    external: true
